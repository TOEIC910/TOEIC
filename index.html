<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TOEIC VOCA MASTER - 병진 커스텀</title>
<style>
:root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #3b5bdb; --secondary: #2b8a3e; --accent: #ffd43b; --error: #c92a2a; --locked: #444; }
body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
.container { width: 100%; max-width: 680px; padding: 15px; }
.card { background: var(--card); padding: 30px; border-radius: 14px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); text-align: center; }
.view { display: none; }
.active-view { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; background: #2a2a2a; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1em; }
.btn { display: block; width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 7px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; background: var(--primary); }
.btn:hover { opacity: 0.9; transform: scale(1.01); }
.day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
.day-btn { padding: 15px 5px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
.day-btn.locked { background: var(--locked); color: #888; cursor: not-allowed; position: relative; }
.day-btn.locked::after { content: '🔒'; position: absolute; top: -5px; right: -5px; font-size: 10px; }
.option { display: block; width: 100%; padding: 16px; margin: 10px 0; text-align: left; background: #2a2a2a; border: 1px solid #444; color: var(--text); border-radius: 7px; cursor: pointer; font-size: 16px; font-weight: bold; }
.option.correct { background: #1b5e20 !important; border-color: #4caf50 !important; color: #a5d6a7 !important; }
.option.incorrect { background: #b71c1c !important; border-color: #f44336 !important; color: #ef9a9a !important; }
.explanation { margin-top: 20px; padding: 16px; background: #2a2a2a; border-left: 4px solid var(--primary); text-align: left; display: none; line-height: 1.5; font-weight: bold; font-size: 1em; }
.q-text { font-size: 1.25em; text-align: left; margin-bottom: 25px; line-height: 1.5; font-weight: bold; color: #ffffff; white-space: pre-wrap; }
.list-item { background: #2a2a2a; padding: 16px; border-radius: 7px; margin-bottom: 10px; border-left: 4px solid var(--primary); text-align: left; position: relative; }
.del-btn { position: absolute; right: 12px; top: 12px; background: #444; color: #fff; border: none; border-radius: 4px; padding: 6px 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
h1 { font-size: 2.1em; font-weight: 900; margin-bottom: 15px; }
.scroll-area { max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
</style>
</head>
<body>
<div class="container">
    <div id="home" class="view active-view card">
        <h1>TOEIC MASTER</h1>
        <div class="stats">
            <div>누적 정답: <span id="stat-correct">0</span></div>
            <div>누적 진행: <span id="stat-total">0</span></div>
        </div>
        <button class="btn" style="padding: 25px; font-size: 20px;" onclick="showDaySelect('quiz')">학습 시작하기</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" style="background:#666" onclick="showDaySelect('voca')">단어장</button>
            <button class="btn" style="background:#444" onclick="showReview()">오답 노트</button>
        </div>
        <button class="btn" style="background:#222; font-size: 12px; padding: 8px;" onclick="resetAllProgress()">데이터 완전 초기화</button>
    </div>

    <div id="day-select" class="view card">
        <h2 id="day-select-title" style="font-weight: 900;">학습 차수 선택</h2>
        <div class="day-grid" id="day-buttons"></div>
        <button class="btn" style="margin-top: 20px; background:#444;" onclick="goHome()">뒤로가기</button>
    </div>

    <div id="mode-select" class="view card">
        <h2 id="selected-day-title" style="font-weight: 900;">DAY 1</h2>
        <p style="font-weight: bold; color: #888;">연습 후 실전 테스트에 도전하세요</p>
        <button class="btn" onclick="startQuiz('easy')">연습: EASY (뜻)</button>
        <button class="btn" style="background:#4dabf7" onclick="startQuiz('normal')">연습: NORMAL (문장)</button>
        <button class="btn" style="background:#748ffc" onclick="startQuiz('hard')">연습: HARD (심화)</button>
        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
        <button class="btn" style="background:var(--error)" onclick="startTest()">🔥 실전 테스트 (HARD 10문제)</button>
        <button class="btn" style="background:#444;" onclick="showDaySelect('quiz')">뒤로가기</button>
    </div>

    <div id="quiz" class="view card">
        <div id="test-progress" style="font-weight: bold; color: var(--accent); margin-bottom: 10px; display: none;">테스트 진행 중: 1 / 10</div>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <button class="btn" style="margin:0; background:#f08c00; color:#000; padding: 12px;" onclick="alert('일시정지!')">일시정지</button>
            <button class="btn" style="margin:0; background:#c92a2a; padding: 12px;" onclick="goHome()">그만하기</button>
        </div>
        <div id="q-text" class="q-text"></div>
        <div id="options"></div>
        <div id="explanation" class="explanation"></div>
        <button id="next-btn" class="btn" style="display:none; background: var(--secondary);" onclick="generateQuestion()">다음 문제 (Enter)</button>
    </div>

    <div id="list-view" class="view card">
        <h2 id="list-title" style="font-weight: 900;">리스트</h2>
        <div id="list-content" class="scroll-area"></div>
        <button id="list-back-btn" class="btn" onclick="goHome()">메인으로</button>
    </div>
</div>

<script>
const dayData = {

{ w: "requirement", m: "필요조건, 요건", n: ["이 직무의 주요 ___ 중 하나는 외국어입니다.", "지원 전 자격 ___을 꼼꼼히 읽어보세요.", "이 소프트웨어의 시스템 ___이 매우 높습니다.", "졸업 ___을 모두 채워야 학위를 받습니다.", "최소 경력은 이 포지션의 필수 ___입니다."], h: ["반드시 충족해야 하는 필수 조건은?", "요구하다에서 파생되어 꼭 필요한 사항은?", "목표 달성을 위해 사전에 요구되는 항목은?", "채용 공고에서 지원자가 갖춰야 할 필수 스펙은?", "법이나 규칙에 따라 의무적으로 지킬 사항은?"] },

{ w: "wage", m: "임금, 급료", n: ["내년 시간제 최저 ___이 인상됩니다.", "노조는 더 나은 ___ 인상을 요구합니다.", "노동자들은 정당한 ___을 받아야 합니다.", "동일 노동에 대해 동일 ___을 지급하세요.", "두 나라는 결국 전쟁을 ___하기로 했습니다."], h: ["주로 시간/일 단위로 계산되는 노동의 대가는?", "더블유(W)로 시작하는 시급이나 일당 체계 단어는?", "전쟁이나 캠페인을 '벌이다'라는 뜻의 동사는?", "육체 노동의 대가인 삯을 뜻하는 4글자 영단어는?", "샐러리(salary)와 대비되는 가변적 임금 명사는?"] }
]};

const allWordsGlobal = [];
Object.values(dayData).forEach(arr => arr.forEach(item => allWordsGlobal.push(item.w)));

let currentCorrectCount = parseInt(localStorage.getItem('toeic_correct')) || 0;
let totalSolvedCount = parseInt(localStorage.getItem('toeic_total')) || 0;
let unlockedDay = parseInt(localStorage.getItem('toeic_unlocked_day')) || 1;
let mistakes = JSON.parse(localStorage.getItem('toeic_mistakes')) || [];

let currentWord = null;
let currentDiff = 'easy';
let currentSelectedDay = 1;
let testScore = 0;
let testStep = 0;
let isTestMode = false;

function saveProgress() {
    localStorage.setItem('toeic_correct', currentCorrectCount);
    localStorage.setItem('toeic_total', totalSolvedCount);
    localStorage.setItem('toeic_unlocked_day', unlockedDay);
    localStorage.setItem('toeic_mistakes', JSON.stringify(mistakes));
}

function updateHomeStats() {
    document.getElementById('stat-correct').innerText = currentCorrectCount;
    document.getElementById('stat-total').innerText = totalSolvedCount;
}

function goHome() { updateHomeStats(); switchView('#home'); }

function showDaySelect(target) {
    const container = document.getElementById('day-buttons');
    const title = document.getElementById('day-select-title');
    container.innerHTML = '';
    title.innerText = target === 'quiz' ? '학습 차수 선택' : '단어장 차수 선택';
    for(let i=1; i<=30; i++) {
        const btn = document.createElement('button');
        const isLocked = target === 'quiz' && i > unlockedDay;
        btn.className = 'day-btn' + (isLocked ? ' locked' : '');
        btn.innerText = 'DAY ' + i;
        btn.onclick = () => {
            if(isLocked) { alert('이전 DAY 테스트에서 90점 이상 받아야 열립니다!'); return; }
            currentSelectedDay = i;
            if(target === 'quiz') { document.getElementById('selected-day-title').innerText = 'DAY ' + i; switchView('#mode-select'); }
            else { showVocaList(i); }
        };
        container.appendChild(btn);
    }
    switchView('#day-select');
}

function startQuiz(diff) {
    if(!dayData[currentSelectedDay]) { alert("준비 중인 차수입니다."); return; }
    isTestMode = false; currentDiff = diff;
    document.getElementById('test-progress').style.display = 'none';
    switchView('#quiz'); generateQuestion();
}

function startTest() {
    if(!dayData[currentSelectedDay]) { alert("준비 중인 차수입니다."); return; }
    if(!confirm("HARD 10문제가 출제됩니다. 90점 이상 시 다음 DAY가 해금됩니다.")) return;
    isTestMode = true; testScore = 0; testStep = 0;
    document.getElementById('test-progress').style.display = 'block';
    switchView('#quiz'); generateQuestion();
}

function generateQuestion() {
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    const words = dayData[currentSelectedDay];
    if(isTestMode) {
        testStep++;
        if(testStep > 10) { finishTest(); return; }
        document.getElementById('test-progress').innerText = `테스트 진행 중: ${testStep} / 10`;
    }
    currentWord = words[Math.floor(Math.random() * words.length)];
    const nIdx = Math.floor(Math.random() * 5);
    const hIdx = Math.floor(Math.random() * 5);
    let qText = "";
    if (isTestMode || currentDiff === 'hard') qText = `[HARD] ${currentWord.h[hIdx]}`;
    else if (currentDiff === 'normal') qText = `[NORMAL] 빈칸에 알맞은 단어는?\n"${currentWord.n[nIdx]}"`;
    else qText = `[EASY] 다음 뜻을 가진 단어는?\n뜻: ${currentWord.m}`;
    document.getElementById('q-text').innerText = qText;
    let options = [currentWord.w];
    while(options.length < 4) {
        let rand = allWordsGlobal[Math.floor(Math.random() * allWordsGlobal.length)];
        if(!options.includes(rand)) options.push(rand);
    }
    options.sort(() => Math.random() - 0.5);
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = `${index + 1}. ${opt}`;
        btn.onclick = () => checkAnswer(btn, opt);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(btn, selected) {
    const btns = document.querySelectorAll('.option');
    if (btns.length === 0 || btns[0].disabled) return;
    btns.forEach(b => b.disabled = true);
    totalSolvedCount++;
    const isCorrect = selected === currentWord.w;
    const expDiv = document.getElementById('explanation');
    expDiv.style.display = 'block'; document.getElementById('next-btn').style.display = 'block';
    if (isCorrect) {
        btn.classList.add('correct'); currentCorrectCount++;
        if(isTestMode) testScore += 10;
        expDiv.innerText = `정답입니다! [${currentWord.w}: ${currentWord.m}]`;
    } else {
        btn.classList.add('incorrect');
        btns.forEach(b => { if(b.innerText.split(". ")[1] === currentWord.w) b.classList.add('correct'); });
        expDiv.innerText = `오답입니다. 정답은 '${currentWord.w}' [${currentWord.m}]`;
        if(!mistakes.find(m => m.w === currentWord.w)) {
            mistakes.push({w: currentWord.w, m: currentWord.m, s: currentWord.n[0]});
        }
    }
    saveProgress();
}

function finishTest() {
    alert(`테스트 종료! 점수: ${testScore}점`);
    if(testScore >= 90) {
        alert(`🎉 다음 DAY가 해금되었습니다!`);
        if(unlockedDay === currentSelectedDay && unlockedDay < 30) unlockedDay++;
        saveProgress();
    } else { alert("아쉽네요! 90점 이상이어야 다음 스테이지가 열립니다."); }
    goHome();
}

function showReview() {
    switchView('#list-view');
    document.getElementById('list-title').innerText = "오답 노트";
    document.getElementById('list-back-btn').onclick = goHome;
    const content = document.getElementById('list-content');
    content.innerHTML = mistakes.length === 0 ? "틀린 단어가 없습니다!" : "";
    mistakes.forEach(m => {
        content.innerHTML += `<div class="list-item" style="border-left-color: var(--error)">
            <button class="del-btn" onclick="deleteMistake('${m.w}')">삭제</button>
            <div style="font-size:18px; color:#3b5bdb; font-weight:bold">${m.w} (${m.m})</div>
            <div style="margin-top:8px;">예시: ${m.s}</div>
        </div>`;
    });
}

function showVocaList(day) {
    switchView('#list-view');
    document.getElementById('list-title').innerText = `DAY ${day} 단어장`;
    document.getElementById('list-back-btn').onclick = () => showDaySelect('voca');
    const content = document.getElementById('list-content');
    content.innerHTML = !dayData[day] ? "준비 중입니다." : "";
    if(dayData[day]) {
        [...dayData[day]].sort((a,b)=>a.w.localeCompare(b.w)).forEach(w => {
            content.innerHTML += `<div class="list-item">
                <div style="font-size:18px; color:#3b5bdb; font-weight:bold">${w.w}</div>
                <div style="font-size:16px; font-weight:bold; color:#fff;">뜻: ${w.m}</div>
            </div>`;
        });
    }
}

function deleteMistake(word) { mistakes = mistakes.filter(m => m.w !== word); saveProgress(); showReview(); }
function clearAllMistakes() { if(confirm("모두 삭제할까요?")) { mistakes = []; saveProgress(); showReview(); } }
function resetAllProgress() { if(confirm("초기화할까요?")) { localStorage.clear(); location.reload(); } }
function switchView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view')); document.querySelector(id).classList.add('active-view'); }

window.addEventListener('keydown', (e) => {
    const quizView = document.getElementById('quiz');
    if (!quizView.classList.contains('active-view')) return;
    const nextBtn = document.getElementById('next-btn');
    if (['1','2','3','4'].includes(e.key)) {
        const idx = parseInt(e.key)-1;
        const opts = document.querySelectorAll('.option');
        if (opts[idx] && !opts[idx].disabled) opts[idx].click();
    }
    if (e.key === 'Enter' && nextBtn.style.display !== 'none') nextBtn.click();
});

updateHomeStats();
</script>
</body>

let testScore = 0; let testStep = 0; let isTestMode = false;
let timerInterval = null; let timeLimit = 0; let timeRemaining = 0; let isPaused = false;

function saveProgress() { localStorage.setItem('toeic_correct', currentCorrectCount); localStorage.setItem('toeic_total', totalSolvedCount); localStorage.setItem('toeic_unlocked_day', unlockedDay); localStorage.setItem('toeic_mistakes', JSON.stringify(mistakes)); }
function updateHomeStats() { document.getElementById('stat-correct').innerText = currentCorrectCount; document.getElementById('stat-total').innerText = totalSolvedCount; }
function goHome() { clearInterval(timerInterval); updateHomeStats(); switchView('#home'); }
function showDaySelect(target) {
    const container = document.getElementById('day-buttons'); const title = document.getElementById('day-select-title'); container.innerHTML = '';
    title.innerText = target === 'quiz' ? '학습 차수 선택' : '단어장 차수 선택';
    for(let i=1; i<=1; i++) { // 현재 DAY 1만 데이터 있음
        const btn = document.createElement('button'); btn.className = 'day-btn'; btn.innerText = 'DAY ' + i;
        btn.onclick = () => { currentSelectedDay = i; if(target === 'quiz') { document.getElementById('selected-day-title').innerText = 'DAY ' + i; switchView('#mode-select'); } else { showVocaList(i); } };
        container.appendChild(btn);
    }
    switchView('#day-select');
}
function startQuiz(diff) { isTestMode = false; currentDiff = diff; document.getElementById('test-progress').style.display = 'none'; switchView('#quiz'); generateQuestion(); }
function startTest() { if(!confirm("HARD 10문제가 출제됩니다.")) return; isTestMode = true; testScore = 0; testStep = 0; document.getElementById('test-progress').style.display = 'block'; switchView('#quiz'); generateQuestion(); }
function generateQuestion() {
    clearInterval(timerInterval); isPaused = false; document.getElementById('pause-overlay').style.display = 'none'; document.getElementById('explanation').style.display = 'none'; document.getElementById('next-btn').style.display = 'none'; document.getElementById('timer-cont').style.display = 'block';
    const words = dayData[currentSelectedDay];
    if(isTestMode) { testStep++; if(testStep > 10) { finishTest(); return; } document.getElementById('test-progress').innerText = `테스트: ${testStep} / 10`; }
    currentWord = words[Math.floor(Math.random() * words.length)];
    if (isTestMode || currentDiff === 'hard') timeLimit = 60; else if (currentDiff === 'normal') timeLimit = 30; else timeLimit = 10;
    timeRemaining = timeLimit; updateTimerBar();
    let qText = "";
    if (isTestMode || currentDiff === 'hard') qText = `[💀 HARD - 60s]\n"${currentWord.h[0].split('|')[0]}"`;
    else if (currentDiff === 'normal') { const nIdx = Math.floor(Math.random() * currentWord.n.length); const p = currentWord.n[nIdx].split('|'); qText = `[NORMAL - 30s]\n"${p[0]}"\n(${p[1]})`; }
    else qText = `[EASY - 10s]\n뜻: ${currentWord.m}`;
    document.getElementById('q-text').innerText = qText;
    let options = [currentWord.w]; while(options.length < 4) { let rand = allWordsGlobal[Math.floor(Math.random() * allWordsGlobal.length)]; if(!options.includes(rand)) options.push(rand); }
    options.sort(() => Math.random() - 0.5);
    const optionsDiv = document.getElementById('options'); optionsDiv.innerHTML = '';
    options.forEach((opt, index) => { const btn = document.createElement('button'); btn.className = 'option'; btn.innerText = `${index + 1}. ${opt}`; btn.onclick = () => checkAnswer(btn, opt); optionsDiv.appendChild(btn); });
    startTimer();
}
function startTimer() { timerInterval = setInterval(() => { if (!isPaused) { timeRemaining -= 0.1; updateTimerBar(); if (timeRemaining <= 0) { clearInterval(timerInterval); checkAnswer(null, 'TIMEOUT'); } } }, 100); }
function updateTimerBar() { document.getElementById('timer-bar').style.width = (timeRemaining / timeLimit) * 100 + "%"; }
function togglePause() { isPaused = !isPaused; document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none'; }
function checkAnswer(btn, selected) {
    clearInterval(timerInterval); const btns = document.querySelectorAll('.option'); if (btns.length === 0 || btns[0].disabled) return;
    btns.forEach(b => b.disabled = true); totalSolvedCount++;
    const isCorrect = selected === currentWord.w; const expDiv = document.getElementById('explanation'); expDiv.style.display = 'block'; document.getElementById('next-btn').style.display = 'block';
    if (isCorrect) { if(btn) btn.classList.add('correct'); currentCorrectCount++; if(isTestMode) testScore += 10; expDiv.innerText = `정답! [${currentWord.w}: ${currentWord.m}]`; }
    else { if(btn && selected !== 'TIMEOUT') btn.classList.add('incorrect'); btns.forEach(b => { if(b.innerText.split(". ")[1] === currentWord.w) b.classList.add('correct'); });
        expDiv.innerText = (selected === 'TIMEOUT' ? "시간 초과! " : "오답! ") + `정답: '${currentWord.w}' [${currentWord.m}]`;
        if(!mistakes.find(m => m.w === currentWord.w)) mistakes.push({w: currentWord.w, m: currentWord.m, s: currentWord.n[0].split('|')[0]});
    } saveProgress();
}
function finishTest() { alert(`점수: ${testScore}점`); if(testScore >= 90 && unlockedDay < 30) unlockedDay++; saveProgress(); goHome(); }
function showReview() {
    switchView('#list-view'); document.getElementById('list-title').innerText = "오답 노트";
    const content = document.getElementById('list-content'); content.innerHTML = mistakes.length === 0 ? "없음" : "";
    mistakes.forEach(m => { content.innerHTML += `<div class="list-item"><button class="del-btn" onclick="deleteMistake('${m.w}')">삭제</button><div style="font-size:18px; color:#3b5bdb; font-weight:bold">${m.w} (${m.m})</div><div style="margin-top:8px;">${m.s}</div></div>`; });
}
function showVocaList(day) {
    switchView('#list-view'); document.getElementById('list-title').innerText = `DAY ${day} 단어장`;
    const content = document.getElementById('list-content'); content.innerHTML = "";
    [...dayData[day]].sort((a,b)=>a.w.localeCompare(b.w)).forEach(w => { content.innerHTML += `<div class="list-item"><div style="font-size:18px; color:#3b5bdb; font-weight:bold">${w.w}</div><div style="color:#fff;">뜻: ${w.m}</div></div>`; });
}
function deleteMistake(word) { mistakes = mistakes.filter(m => m.w !== word); saveProgress(); showReview(); }
function resetAllProgress() { if(confirm("초기화?")) { localStorage.clear(); location.reload(); } }
function switchView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view')); document.querySelector(id).classList.add('active-view'); }
window.addEventListener('keydown', (e) => {
    if (!document.getElementById('quiz').classList.contains('active-view') || (isPaused && e.key !== ' ')) return;
    if (['1','2','3','4'].includes(e.key)) { const idx = parseInt(e.key)-1; const opts = document.querySelectorAll('.option'); if (opts[idx] && !opts[idx].disabled) opts[idx].click(); }
    if (e.key === 'Enter' && document.getElementById('next-btn').style.display !== 'none') document.getElementById('next-btn').click();
    if (e.key === ' ') { e.preventDefault(); togglePause(); }
});
updateHomeStats();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC VOCA MASTER PRO - 병진 커스텀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="home" class="view active-view card">
            <h1>TOEIC MASTER PRO</h1>
            <div class="stats">
                <div>누적 정답: <span id="stat-correct">0</span></div>
                <div>누적 진행: <span id="stat-total">0</span></div>
            </div>
            <button class="btn main-start-btn" onclick="showDaySelect('quiz')">학습 시작하기</button>
            <div class="main-sub-btns">
                <button class="btn btn-voca" onclick="showDaySelect('voca')">단어장</button>
                <button class="btn btn-review" onclick="showReview()">오답 노트</button>
            </div>
            <button class="btn btn-reset" onclick="resetAllProgress()">데이터 완전 초기화</button>
        </div>

        <div id="day-select" class="view card">
            <h2 id="day-select-title">학습 차수 선택</h2>
            <div class="day-grid" id="day-buttons"></div>
            <button class="btn btn-back" onclick="goHome()">뒤로가기</button>
        </div>

        <div id="mode-select" class="view card">
            <h2 id="selected-day-title">DAY 1</h2>
            <button class="btn" onclick="startQuiz('easy')">EASY (10초)</button>
            <button class="btn btn-normal" onclick="startQuiz('normal')">NORMAL (30초)</button>
            <hr class="divider">
            <button class="btn btn-hard" onclick="startQuiz('hard')">💀 HARD (60초)</button>
            <button class="btn btn-hard" onclick="startTest()">🔥 실전 테스트 (HARD)</button>
            <button class="btn btn-back" onclick="showDaySelect('quiz')">뒤로가기</button>
        </div>

        <div id="quiz" class="view card">
            <div class="timer-container" id="timer-cont"><div id="timer-bar"></div></div>
            <div id="pause-overlay">
                <h2>PAUSED</h2>
                <button class="btn pause-continue" onclick="togglePause()">계속하기</button>
            </div>
            <div id="test-progress"></div>
            <div class="quiz-controls">
                <button id="pause-btn" class="btn btn-pause" onclick="togglePause()">일시정지</button>
                <button class="btn btn-quit" onclick="goHome()">그만하기</button>
            </div>
            <div id="q-text" class="q-text"></div>
            <div id="options"></div>
            <div id="explanation" class="explanation"></div>
            <button id="next-btn" class="btn btn-next" onclick="generateQuestion()">다음 문제 (Enter)</button>
        </div>

        <div id="list-view" class="view card">
            <h2 id="list-title">리스트</h2>
            <div id="list-content" class="scroll-area"></div>
            <button id="list-back-btn" class="btn" onclick="goHome()">메인으로</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
